<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPS - Handherkenning</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="bg-icons">
        <span class="icon rock">✊</span>
        <span class="icon paper">✋</span>
        <span class="icon scissors">✌️</span>
    </div>

    <div class="main-container">
        <div id="status-text">Laden van hand-detectie...</div>

        <div class="score-board">
            <span id="user-score">0</span> - <span id="pc-score">0</span>
        </div>
        
        <div class="game-wrapper">
            <div class="video-container">
                <video id="webcam" autoplay playsinline></video>
                <canvas id="output_canvas"></canvas>
            </div>
            
            <button id="play-round-btn" class="start-button" style="font-size: 1.5em; margin-bottom: 10px;">Speel Ronde!</button>
    
            <div class="result-display">
                <div id="user-gesture">Jij: ?</div>
                <div id="timer">-</div>
                <div id="pc-gesture">PC: ?</div>
            </div>
        </div>
    
        <a href="index.html" class="start-button" style="font-size: 1em; padding: 0.5em 1em; background-color: #ff6b6b;">Stop Spel</a>
    </div>

    <div id="game-over-modal" class="modal">
        <div class="modal-content">
            <h2 id="final-result-text">JIJ HEBT GEWONNEN!</h2>
            <p id="final-score">Eindstand: 2 - 1</p>
            <button id="restart-btn" class="start-button">Speel Opnieuw</button>
            <br><br>
            <a href="index.html" style="color: #1A1A3D; font-family: sans-serif;">Terug naar menu</a>
        </div>
    </div>

    <audio id="snd-tick" preload="auto" src="https://www.soundjay.com/buttons/beep-07a.mp3"></audio>
    <audio id="snd-go" preload="auto" src="https://www.soundjay.com/buttons/button-11.mp3"></audio>
    <audio id="snd-win" preload="auto" src="https://www.myinstants.com/media/sounds/cheer.mp3"></audio>
    <audio id="snd-lose" preload="auto" src="https://www.myinstants.com/media/sounds/sad-trombone.mp3"></audio>

    <script type="module" src="js/game.js"></script>
</body>
</html>
